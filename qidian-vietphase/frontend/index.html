<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AI-Translate · VietPhase</title>
  <link rel="stylesheet" href="/static/tokens.css" />
  <link rel="stylesheet" href="/static/src/styles.css" />
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js"
    integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L"
    crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"
    integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm"
    crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"
    integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y"
    crossorigin="anonymous"></script>

  <!-- Empty data init (globals populated by app.jsx from real API) -->
  <script src="/static/src/api_bridge.js"></script>

  <!-- Design system components (order matters — dependencies first) -->
  <script type="text/babel" data-presets="react" src="/static/src/tweaks-panel.jsx"></script>
  <script type="text/babel" data-presets="react" src="/static/src/components.jsx"></script>
  <script type="text/babel" data-presets="react" src="/static/src/shell.jsx"></script>
  <script type="text/babel" data-presets="react" src="/static/src/chapters.jsx"></script>
  <script type="text/babel" data-presets="react" src="/static/src/translation_view.jsx"></script>
  <script type="text/babel" data-presets="react" src="/static/src/glossary.jsx"></script>
  <script type="text/babel" data-presets="react" src="/static/src/wiki.jsx"></script>
  <script type="text/babel" data-presets="react" src="/static/src/output.jsx"></script>
  <script type="text/babel" data-presets="react" src="/static/src/settings.jsx"></script>
  <script type="text/babel" data-presets="react" src="/static/src/cmdk.jsx"></script>
  <script type="text/babel" data-presets="react" src="/static/src/app.jsx"></script>

  <script>
    // Dev auto-reload: browser tự refresh khi uvicorn restart sau khi save code
    (function () {
      let down = false;
      setInterval(async () => {
        try {
          await fetch("/_dev/ping", { cache: "no-store" });
          if (down) location.reload();
        } catch { down = true; }
      }, 800);
    })();
  </script>
</body>
</html>
