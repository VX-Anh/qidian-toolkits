<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Segoe UI", sans-serif;
      width: 360px;
      background: #1a1a2e;
      color: #e0e0e0;
      padding: 16px;
    }
    h2 { font-size: 14px; color: #a78bfa; margin-bottom: 14px; }
    label { font-size: 11px; color: #9ca3af; display: block; margin-bottom: 4px; }
    #status {
      font-size: 12px;
      color: #9ca3af;
      margin-bottom: 10px;
      min-height: 18px;
      word-break: break-word;
    }
    .progress-track {
      background: #16213e;
      border-radius: 4px;
      height: 4px;
      margin-bottom: 10px;
      overflow: hidden;
    }
    #progressBar {
      height: 100%;
      width: 0%;
      background: #7c3aed;
      border-radius: 4px;
      transition: width 0.3s ease;
    }
    #preview {
      background: #16213e;
      border: 1px solid #2d2d5e;
      border-radius: 6px;
      padding: 10px;
      font-size: 12px;
      line-height: 1.7;
      max-height: 160px;
      overflow-y: auto;
      margin-bottom: 10px;
      white-space: pre-wrap;
      display: none;
    }
    #charCount { font-size: 11px; color: #6b7280; text-align: right; margin-bottom: 10px; }
    .btn {
      width: 100%;
      padding: 9px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
      margin-bottom: 8px;
    }
    .btn:last-child { margin-bottom: 0; }
    .btn:hover { opacity: 0.85; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    #btnCapture { background: #7c3aed; color: #fff; }
    #btnCopyTxt { background: #1e3a5f; color: #93c5fd; }
    .warning { font-size: 11px; color: #f59e0b; margin-bottom: 10px; display: none; }
    .divider { border: none; border-top: 1px solid #2d2d5e; margin: 12px 0; }
    input[type="text"] {
      width: 100%;
      padding: 8px 10px;
      background: #16213e;
      border: 1px solid #2d2d5e;
      border-radius: 6px;
      color: #e0e0e0;
      font-size: 12px;
      margin-bottom: 8px;
    }
    input[type="text"]::placeholder { color: #4b5563; }
  </style>
</head>
<body>
  <h2>Qidian Chapter Scraper</h2>
  <p style="font-size:11px;color:#6b7280;margin-bottom:12px">Lưu chương về Downloads: ảnh (.jpg) hoặc văn bản (.txt)</p>

  <label>Novel Slug (tên thư mục lưu)</label>
  <input type="text" id="novelSlug" placeholder="vd: thien-dien-quyet" autocomplete="off" />

  <hr class="divider" />

  <div id="status">Mở một trang chapter để bắt đầu.</div>
  <div class="progress-track"><div id="progressBar"></div></div>
  <p class="warning" id="warning">⏳ Đang chụp — banner vàng trên trình duyệt là bình thường.</p>
  <div id="preview"></div>
  <div id="charCount"></div>

  <button class="btn" id="btnCapture">📷 Chụp ảnh → .jpg</button>
  <button class="btn" id="btnCopyTxt">📋 Copy text → .txt</button>
  <script src="popup.js"></script>
</body>
</html>
