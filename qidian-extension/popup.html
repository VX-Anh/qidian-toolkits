<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Segoe UI", sans-serif;
      width: 360px;
      background: #1a1a2e;
      color: #e0e0e0;
      padding: 16px;
    }
    h2 { font-size: 14px; color: #a78bfa; margin-bottom: 14px; }
    label { font-size: 11px; color: #9ca3af; display: block; margin-bottom: 4px; }
    input[type="password"] {
      width: 100%;
      padding: 8px 10px;
      background: #16213e;
      border: 1px solid #2d2d5e;
      border-radius: 6px;
      color: #e0e0e0;
      font-size: 12px;
      margin-bottom: 12px;
    }
    input[type="password"]::placeholder { color: #4b5563; }
    #status {
      font-size: 12px;
      color: #9ca3af;
      margin-bottom: 10px;
      min-height: 18px;
      word-break: break-word;
    }
    .progress-track {
      background: #16213e;
      border-radius: 4px;
      height: 4px;
      margin-bottom: 10px;
      overflow: hidden;
    }
    #progressBar {
      height: 100%;
      width: 0%;
      background: #7c3aed;
      border-radius: 4px;
      transition: width 0.3s ease;
    }
    #preview {
      background: #16213e;
      border: 1px solid #2d2d5e;
      border-radius: 6px;
      padding: 10px;
      font-size: 12px;
      line-height: 1.7;
      max-height: 160px;
      overflow-y: auto;
      margin-bottom: 10px;
      white-space: pre-wrap;
      display: none;
    }
    #charCount { font-size: 11px; color: #6b7280; text-align: right; margin-bottom: 10px; }
    .btn {
      width: 100%;
      padding: 9px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
      margin-bottom: 8px;
    }
    .btn:last-child { margin-bottom: 0; }
    .btn:hover { opacity: 0.85; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    #btnTest    { background: #1e3a5f; color: #93c5fd; }
    #btnCapture { background: #7c3aed; color: #fff; }
    #btnDownload { background: #065f46; color: #6ee7b7; display: none; }
    .warning { font-size: 11px; color: #f59e0b; margin-bottom: 10px; display: none; }
    .divider { border: none; border-top: 1px solid #2d2d5e; margin: 12px 0; }
    .section-title { font-size: 11px; color: #a78bfa; font-weight: 600; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.05em; }
    input[type="text"] {
      width: 100%;
      padding: 8px 10px;
      background: #16213e;
      border: 1px solid #2d2d5e;
      border-radius: 6px;
      color: #e0e0e0;
      font-size: 12px;
      margin-bottom: 8px;
    }
    input[type="text"]::placeholder { color: #4b5563; }
    .toggle-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
    }
    .toggle-row input[type="checkbox"] { accent-color: #7c3aed; width: 13px; height: 13px; cursor: pointer; }
    .toggle-row label { font-size: 11px; color: #9ca3af; cursor: pointer; }
    #pushStatus { font-size: 11px; color: #6ee7b7; margin-top: 6px; min-height: 14px; display: none; }
  </style>
</head>
<body>
  <h2>Qidian Chapter Scraper</h2>
  <p style="font-size:11px;color:#6b7280;margin-bottom:12px">OCR xử lý qua VietPhase (localhost:9999)</p>

  <hr class="divider" />
  <div class="section-title">VietPhase Integration</div>
  <label>Novel Slug</label>
  <input type="text" id="novelSlug" placeholder="vd: thien-dien-quyet" autocomplete="off" />
  <div class="toggle-row">
    <input type="checkbox" id="autoPush" />
    <label for="autoPush">Tự gửi vào VietPhase sau OCR</label>
  </div>
  <div class="toggle-row">
    <input type="checkbox" id="autoTranslate" />
    <label for="autoTranslate">Tự dịch ngay sau khi gửi</label>
  </div>
  <div class="toggle-row">
    <input type="checkbox" id="autoOcr" />
    <label for="autoOcr">Tự động OCR khi mở popup trên chapter</label>
  </div>
  <div id="pushStatus"></div>
  <hr class="divider" />

  <div id="status">Mở một trang chapter để bắt đầu.</div>
  <div class="progress-track"><div id="progressBar"></div></div>
  <p class="warning" id="warning">⏳ Đang chụp — banner vàng trên trình duyệt là bình thường.</p>
  <div id="preview"></div>
  <div id="charCount"></div>
  <button class="btn" id="btnTest">Chụp thử (xem ảnh)</button>
  <button class="btn" id="btnCapture">Chụp &amp; OCR → .txt</button>
  <button class="btn" id="btnDownload">Download .txt</button>
  <script src="popup.js"></script>
</body>
</html>
